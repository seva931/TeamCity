name: run-tests

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

jobs:
  run-tests:
    name: Set up services and run tests
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TEAMCITY_DATA_TAG: teamcity-data
      TEAMCITY_DATA_ASSET: teamcity-data.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run Checkstyle
        run: mvn -B checkstyle:checkstyle

      - name: Download TeamCity data asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TEAMCITY_DATA_TAG" \
            --pattern "$TEAMCITY_DATA_ASSET" \
            --output "$TEAMCITY_DATA_ASSET"

      - name: Extract TeamCity data
        run: |
          tar -xzf "$TEAMCITY_DATA_ASSET" -C infra
          ls -la infra
          ls -la infra/teamcity-data

      - name: Start services
        run: |
          cd infra
          bash restart_docker.sh selenoid

      - name: Fix permissions (use container UID)
        run: |
          TC_UID=$(docker compose exec -T teamcity-server id -u)
          TC_GID=$(docker compose exec -T teamcity-server id -g)
          echo "TeamCity UID:GID = $TC_UID:$TC_GID"
          sudo chown -R "$TC_UID:$TC_GID" infra/teamcity-data
          ls -ln infra/teamcity-data

      - name: Set env
        working-directory: ./infra
        run: cp .env.example .env

      - name: Wait for TeamCity
        run: |
          timeout 600 bash -c '
            until curl -fsS http://localhost:8111/login.html > /dev/null; do
              sleep 10
            done
          '

      - name: Clean Allure dirs
        run: |
          rm -rf allure-results target/site/allure-maven-plugin

      - name: Run tests
        run: mvn clean test -q

      - name: Load report history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          path: gh-pages
          ref: gh-pages

      - name: Build Allure report
        if: always()
        uses: simple-elf/allure-report-action@v1.13
        with:
          gh_pages: gh-pages
          allure_history: allure-history
          allure_results: allure-results

      - name: Fix permissions
        if: always()
        run: |
          sudo chown -R $USER:$USER allure-history

      - name: Publish report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Cleanup services
        if: always()
        working-directory: ./infra
        run: docker compose down -v
